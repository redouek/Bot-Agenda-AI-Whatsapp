name: "WhatsApp Calendar Bot"
version: "1.0.0"
slug: "whatsapp-calendar-bot"
description: "Bot WhatsApp + Gemini + Google Calendar via self-chat"
arch:
  - amd64
  - aarch64
  - armv7

options:
  GRUPO_ASSISTENTE_ID: "5511999999999@c.us"
  GOOGLE_API_KEY: ""
  GOOGLE_CALENDAR_ID: "primary"
  GOOGLE_SERVICE_ACCOUNT_KEY_JSON: "{}"
